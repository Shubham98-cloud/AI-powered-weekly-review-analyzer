<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pulse Agent | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid var(--primary);
            color: #818cf8;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        h2 { font-size: 1.2rem; margin-bottom: 20px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #475569; cursor: not-allowed; box-shadow: none; }

        .log-container {
            background: #020617;
            border-radius: 12px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .log-entry { margin-bottom: 5px; animation: slideIn 0.3s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .product-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            margin-bottom: 20px;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Pulse Agent</h1>
            <div id="status-badge" class="status-badge">System Ready</div>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Control Panel</h2>
                <select id="product-select" class="product-select">
                    <option value="">All Products</option>
                    <option value="Groww">Groww</option>
                    <option value="INDMoney">INDMoney</option>
                </select>
                <button id="run-btn" class="btn" onclick="runAgent()">Trigger Weekly Pulse</button>
            </div>

            <div class="card">
                <h2>Health Metrics</h2>
                <p style="color: #94a3b8; font-size: 0.9rem;">Last successful run:</p>
                <p id="last-run" style="font-size: 1.1rem; margin-bottom: 15px;">Never</p>
                <p style="color: #94a3b8; font-size: 0.9rem;">Next Scheduled:</p>
                <p style="font-size: 1.1rem; color: var(--primary);">Monday, 09:00 AM</p>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h2>Live Execution Logs</h2>
            <div id="logs" class="log-container">
                <div class="log-entry">> Waiting for command...</div>
            </div>
        </div>
    </div>

    <script>
        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                const badge = document.getElementById('status-badge');
                const btn = document.getElementById('run-btn');
                const lastRun = document.getElementById('last-run');
                const logContainer = document.getElementById('logs');

                badge.innerText = data.status.toUpperCase();
                badge.style.borderColor = data.status === 'running' ? '#f59e0b' : '#6366f1';
                badge.style.color = data.status === 'running' ? '#f59e0b' : '#818cf8';
                
                btn.disabled = data.status === 'running';
                btn.innerText = data.status === 'running' ? 'Agent Working...' : 'Trigger Weekly Pulse';

                if (data.last_run) {
                    lastRun.innerText = new Date(data.last_run).toLocaleString();
                }

                logContainer.innerHTML = data.logs.map(log => `<div class="log-entry">> ${log}</div>`).join('') || '<div class="log-entry">> Idle</div>';
                logContainer.scrollTop = logContainer.scrollHeight;

            } catch (e) {
                console.error("Failed to fetch status", e);
            }
        }

        async function runAgent() {
            const product = document.getElementById('product-select').value;
            await fetch(`/api/run?product=${product}`, { method: 'POST' });
            updateStatus();
        }

        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
