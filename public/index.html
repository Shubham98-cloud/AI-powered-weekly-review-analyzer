<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pulse | Review Intelligence Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --accent-blue: #00f2ff;
            --accent-magenta: #ff00c8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(255, 0, 200, 0.05) 0%, transparent 50%);
            animation: pulse 15s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .container {
            width: 95%;
            max-width: 1200px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Control Panel */
        .control-panel h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--accent-blue);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .btn-trigger {
            width: 100%;
            background: linear-gradient(45deg, var(--accent-blue), #00a2ff);
            color: #000;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }

        .btn-trigger:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-trigger:active { transform: translateY(0); }

        .btn-trigger:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #334155;
            color: #94a3b8;
        }

        /* Stats Section */
        .stats {
            margin-top: 2rem;
            display: grid;
            gap: 1rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label { color: var(--text-dim); font-size: 0.85rem; }
        .stat-value { font-weight: 600; color: #fff; }

        /* Terminal Logs */
        .terminal {
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .terminal-header .dot-group { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        #log-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry { margin-bottom: 0.6rem; line-height: 1.5; }
        .log-time { color: var(--accent-blue); opacity: 0.7; margin-right: 10px; }
        .log-info { color: #27c93f; }
        .log-error { color: #ff5f56; }

        /* Status Badge */
        #status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-idle { background: rgba(148, 163, 184, 0.1); color: #94a3b8; }
        .status-running { background: rgba(0, 242, 255, 0.1); color: var(--accent-blue); animation: pulse-status 2s infinite; }
        
        @keyframes pulse-status {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Scrollbar */
        #log-container::-webkit-scrollbar { width: 6px; }
        #log-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <div class="container">
        <header>
            <p>AI-Powered Weekly Intelligence</p>
            <h1>Review Pulse</h1>
        </header>

        <div class="dashboard-grid">
            <!-- Left Panel: Controls -->
            <div class="card control-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h3>Controls</h3>
                    <span id="status-badge" class="status-idle">System Idle</span>
                </div>

                <div class="form-group">
                    <label>Select Product</label>
                    <select id="product-select">
                        <option value="all">Analyze All Products</option>
                        <option value="Groww">Groww</option>
                        <option value="INDMoney">INDMoney</option>
                        <option value="Zerodha Kite">Zerodha Kite</option>
                        <option value="Upstox">Upstox</option>
                        <option value="Paytm Money">Paytm Money</option>
                    </select>
                </div>

                <button id="run-btn" class="btn-trigger" onclick="startRun()">Initialize Run</button>

                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Last Operation</span>
                        <span id="last-run" class="stat-value">Never</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Active Agents</span>
                        <span class="stat-value" style="color: var(--accent-blue);">7 Core Modules</span>
                    </div>
                </div>
                
                <div style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-dim); text-align: center;">
                    Connected to MCP Docs & Gmail Engine
                </div>
            </div>

            <!-- Right Panel: Logs -->
            <div class="card terminal">
                <div class="terminal-header">
                    <div class="dot-group">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                    </div>
                    <span style="font-size: 0.8rem; color: var(--text-dim);">Live Execution Stream</span>
                </div>
                <div id="log-container">
                    <div class="log-entry"><span class="log-info">System initialized. Ready for command...</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;

        async function startRun() {
            if (isRunning) return;
            
            const product = document.getElementById('product-select').value;
            const btn = document.getElementById('run-btn');
            const badge = document.getElementById('status-badge');
            
            isRunning = true;
            btn.disabled = true;
            btn.innerText = "Analyzing...";
            badge.innerText = "System Running";
            badge.className = "status-running";

            try {
                const response = await fetch(`/api/run?product=${product === 'all' ? '' : product}`, { method: 'POST' });
                const data = await response.json();
                addLog(`Command sent: ${data.message}`, 'info');
            } catch (e) {
                addLog(`Connection Error: ${e.message}`, 'error');
            }
        }

        function addLog(msg, type = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${msg}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const badge = document.getElementById('status-badge');
                const btn = document.getElementById('run-btn');
                const lastRunText = document.getElementById('last-run');

                if (data.status === 'running') {
                    isRunning = true;
                    btn.disabled = true;
                    btn.innerText = "Analyzing...";
                    badge.innerText = "System Running";
                    badge.className = "status-running";
                } else {
                    isRunning = false;
                    btn.disabled = false;
                    btn.innerText = "Initialize Run";
                    badge.innerText = "System Idle";
                    badge.className = "status-idle";
                }

                if (data.last_run) {
                    lastRunText.innerText = new Date(data.last_run).toLocaleString();
                }

                // Sync logs
                const container = document.getElementById('log-container');
                if (data.logs.length > container.children.length - 1) {
                    // Just take the latest ones
                    const newLogs = data.logs.slice(container.children.length - 1);
                    newLogs.forEach(log => {
                        const type = log.toLowerCase().includes('error') ? 'error' : 'info';
                        addLog(log, type);
                    });
                }

            } catch (e) {
                console.error("Polling error", e);
            }
        }

        setInterval(updateStatus, 3000);
    </script>
</body>
</html>
